apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: bgp-config
  namespace: kube-system
spec:
  bgpInstances:
  - name: "65010"
    localASN: 65010
    neighbors:
    - peerAddress: "10.0.0.1/32"
      peerASN: 65010
  - name: "65011"
    localASN: 65011
    neighbors:
    - peerAddress: "10.0.0.2/32"
      peerASN: 65011
