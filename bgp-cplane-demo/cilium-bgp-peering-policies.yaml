---
apiVersion: "cilium.io/v2"
kind: CiliumBGPPeeringPolicy
metadata:
  name: rack0
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      rack: "rack0"
  virtualRouters:
    - localASN: 65010
      exportPodCIDR: true
      neighbors:
        - peerAddress: "10.0.0.1/32"
          peerASN: 65010
      serviceSelector:
        matchExpressions:
          - {key: 'bgp', operator: In, values: ['blue']}
---
apiVersion: "cilium.io/v2"
kind: CiliumBGPPeeringPolicy
metadata:
  name: "rack1"
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      rack: rack1
  virtualRouters:
    - localASN: 65011
      exportPodCIDR: true
      neighbors:
        - peerAddress: "10.0.0.2/32"
          peerASN: 65011
      serviceSelector:
        matchExpressions:
          - {key: 'bgp', operator: In, values: ['blue']}

