kubeProxyReplacement: true
k8sServiceHost: basic-control-plane
k8sServicePort: 6443
image:
  pullPolicy: IfNotPresent
ipam:
  mode: kubernetes
authentication:
  enabled: true
  mutual:
    spire:
      enabled: true
      install:
        enabled: true
hubble:
  relay:
    enabled: true
  ui:
    enabled: true
